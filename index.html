<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Steal The Gem 💎</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>💎 Steal The Gem</h1>
    <p>Find the gem. Steal it. Survive.</p>
  </header>

  <section class="menu">
    <button onclick="startGame()">▶ Play</button>
    <button onclick="showInfo()">ℹ Info</button>
    <button onclick="shop()">🛒 Shop</button>
  </section>

  <div id="infoBox" class="box hidden">
    <p>⚠️ Game idea: You must steal the gem from a protected base and escape!</p>
  </div>

  <div id="shopBox" class="box hidden">
    <p>💎 Shop coming soon...</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
