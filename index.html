<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Steal The Gem 💎</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>💎 STEAL THE GEM</h1>
  <p class="subtitle">Choose your action</p>

  <div class="grid">

    <div class="card" onclick="startGame()">
      <h2>▶ Play</h2>
      <p>Start the game</p>
    </div>

    <div class="card" onclick="showInfo()">
      <h2>ℹ Info</h2>
      <p>How to play</p>
    </div>

    <div class="card" onclick="shop()">
      <h2>🛒 Shop</h2>
      <p>Skins & upgrades</p>
    </div>

    <div class="card" onclick="settings()">
      <h2>⚙ Settings</h2>
      <p>Game options</p>
    </div>

  </div>

  <div id="infoBox" class="box hidden">
    💎 Steal the gem from the base and escape alive!
  </div>

  <div id="shopBox" class="box hidden">
    🛒 Shop coming soon...
  </div>

  <script src="script.js"></script>
</body>
</html>
