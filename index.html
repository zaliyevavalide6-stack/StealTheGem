<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Steal The Gem 💎</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0f1a;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 30px;
      color: gold;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      width: 300px;
      margin: 40px auto;
    }

    .card {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
      background: rgba(255,215,0,0.2);
    }
  </style>
</head>

<body>

  <h1>💎 Steal The Gem</h1>

  <div class="grid">

    <div class="card" onclick="startGame()">
      ▶ Play
    </div>

    <div class="card" onclick="openWiki()">
      📖 Wiki
    </div>

    <div class="card" onclick="alert('Shop coming soon')">
      🛒 Shop
    </div>

    <div class="card" onclick="alert('Settings coming soon')">
      ⚙ Settings
    </div>

  </div>

  <script>
    function startGame() {
      alert("💎 Game starting...");
    }

    function openWiki() {
      window.location.href = "https://github.com/zaliyevavalide6-stack/StealTheGem/wiki";
    }
  </script>

</body>
</html>
